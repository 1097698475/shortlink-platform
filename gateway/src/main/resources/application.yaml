server:
  port: 8000
spring:
  application:
    name: short-link-gateway
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml
  profiles:
    # aggregation 为单体聚合部署模式；dev 使用 gateway + admin + project 独立服务模式
    active: dev
    # active: aggregation
  data:
    redis:
      sentinel:
        master: mymaster
        nodes:
          - 127.0.0.1:26379
          - 127.0.0.1:26380
          - 127.0.0.1:26381
      password: 123456
  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        group: DEFAULT_GROUP
      discovery:
        server-addr: 127.0.0.1:8848
